   <cats-data-grid [rowData]="pagedData" [colDefs]="colDef" [totalRecords]="filteredRows().length" [paginationRequired]="true"
        [sortingRequired]="true" [filterRequired]="true"  [tableOptions]="tableOption()"
        [pageSizeList]="[20,30,50]" (onPaginationChange)="pageChange($event)">
    </cats-data-grid>

<!-- inline template version of the form -->
<ng-template #formTemplate let-data="data">
  <app-add-task-form [patientData]="data" (closed)="onFormClosed()"></app-add-task-form>
</ng-template>

@if(showForm()){
  <ng-container [ngTemplateOutlet]="formTemplate" [ngTemplateOutletContext]="{data: currentPatient}"></ng-container>
